# variables

# screenlock
# use hyprlock
$locker_name = hyprlock
$locker_cmd = $locker_name
# use swaylock
# $locker_name = swaylock
# $locker_cmd = $locker_name -f -c 000000

# dpms
$dpms_off = hyprctl dispatch 'hl.disp.dpms({ action = "disable" })'
$dpms_on  = hyprctl dispatch 'hl.disp.dpms({ action = "enable" })'


# keyboard daemon
# kanata
# TODO
$kb_daemon_pause = :
$kb_daemon_resume = :
#$kb_daemon_pause = systemctl --user stop kanata
#$kb_daemon_resume = systemctl --user start kanata

general {
  # 0: disable 1: normal 2: auto 3: lock notify
  inhibit_sleep = 2

  lock_cmd = $kb_daemon_pause; pidof $locker_name || $locker_cmd; $kb_daemon_resume

  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = $dpms_on

}

listener {
  # dim the screen
  timeout = 293
  on-timeout = busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d .3
  on-resume  = busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 1
}

# listener {
#   # monitor backlight
#   timeout =297
#   on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
#   on-resume = brightnessctl -r                 # monitor backlight restore.
# }

# Lock at 5 minutes
listener {
  timeout = 300
  on-timeout = loginctl lock-session
}

# Turn off screen at 5 minutes and 5 seconds
listener {
  timeout = 305
  on-timeout = $dpms_off
  on-resume  = $dpms_on

}

