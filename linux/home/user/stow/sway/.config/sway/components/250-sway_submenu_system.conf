# system
set $mode_system 󰐥 System: [l]ock$menu_sep[L]ock reset$menu_sep[e]xit$menu_sep[s]uspend$menu_sep[h]ibernate$menu_sep[R]eboot$menu_sep[S]hutdown
mode "$mode_system" {
    # add sleep so i3's key release (after executing) won't cancel the screenlock
    set $locker_reset sleep .3 && /usr/bin/xset dpms 300 300 300

    bindsym l exec swaylock -f -c 000000; mode "default"
    bindsym Shift+l exec --no-startup-id $locker_reset ; mode "default"
    bindsym e exec --no-startup-id swaymsg exit; mode "default"
    bindsym s exec --no-startup-id systemctl suspend ; mode "default"
    #bindsym u exec --no-startup-id swaymsg switch_user, mode "default"
    bindsym h exec --no-startup-id systemctl hybrid-sleep ; mode "default"
    bindsym Shift+r exec --no-startup-id systemctl reboot ; mode "default"
    bindsym Shift+s exec --no-startup-id systemctl poweroff -i; mode "default"

    # exit this mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
