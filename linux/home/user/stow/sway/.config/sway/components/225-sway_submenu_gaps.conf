# gap
set $mode_gap 󰹳 Gaps: [i/k/up/down] inner$menu_sep[j/l/left/right] outer$menu_sep[0] inner=0$menu_sep[p] outer=0$menu_sep[+Shift] 10x$menu_sep[+Ctrl] 50x$menu_sep[+Shift+Ctrl] 100x
mode "$mode_gap" {

    bindsym 0 gaps inner current set 0
    bindsym p gaps outer current set 0

    bindsym i gaps inner current plus 1
    bindsym k gaps inner current minus 1
    bindsym j gaps outer current minus 1
    bindsym l gaps outer current plus 1

    bindsym Up gaps inner current plus 1
    bindsym Down gaps inner current minus 1
    bindsym Left gaps outer current minus 1
    bindsym Right gaps outer current plus 1

    # shift for 10x
    bindsym Shift+i gaps inner current plus 10
    bindsym Shift+k gaps inner current minus 10
    bindsym Shift+j gaps outer current minus 10
    bindsym Shift+l gaps outer current plus 10

    bindsym Shift+Up gaps inner current plus 10
    bindsym Shift+Down gaps inner current minus 10
    bindsym Shift+Left gaps outer current minus 10
    bindsym Shift+Right gaps outer current plus 10

    # ctrl for 50x
    bindsym Control+i gaps inner current plus 50
    bindsym Control+k gaps inner current minus 50
    bindsym Control+j gaps outer current minus 50
    bindsym Control+l gaps outer current plus 50

    bindsym Control+Up gaps inner current plus 50
    bindsym Control+Down gaps inner current minus 50
    bindsym Control+Left gaps outer current minus 50
    bindsym Control+Right gaps outer current plus 50

    # shift+ctrl for 100x
    bindsym Control+Shift+i gaps inner current plus 100
    bindsym Control+Shift+k gaps inner current minus 100
    bindsym Control+Shift+j gaps outer current minus 100
    bindsym Control+Shift+l gaps outer current plus 100

    bindsym Control+Shift+Up gaps inner current plus 100
    bindsym Control+Shift+Down gaps inner current minus 100
    bindsym Control+Shift+Left gaps outer current minus 100
    bindsym Control+Shift+Right gaps outer current plus 100

    # back to normal: Enter or Escape
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
