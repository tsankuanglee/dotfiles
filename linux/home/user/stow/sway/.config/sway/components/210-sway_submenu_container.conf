# container
set $mode_container 󰖯 Container: stackin[g]$menu_sep[Tab] layout$menu_septoggle [t]plit$menu_seps[w]ap
mode "$mode_container" {
    bindsym Return mode "default"
    bindsym Escape mode "default"

    bindsym g layout stacking; mode "default"
    bindsym Tab layout tabbed; mode "default"
    bindsym t layout toggle split; mode "default"

    bindsym w mode "$mode_container_swap"
}

set $mode_container_swap 󰖯 Swap container:
mode "$mode_container_swap" {
    bindsym Return mode "default"
    bindsym Escape mode "default"

    # TODO (perhaps change to swap screen?)
    #bindsym 1 swap container with con_id 1
}
