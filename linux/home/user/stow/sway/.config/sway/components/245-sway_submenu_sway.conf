#  waybar
set $mode_waybar 󱨊 Waybar: [e]dit config$menu_sep[r]eload$menu_sep[v]isibility
mode "$mode_waybar" {
    bindsym e exec kitty --title=waybar_config -- nvim ~/.config/waybar/config; mode "default"
    bindsym v exec pkill -USR1 waybar; mode "default"
    bindsym r exec pkill -USR2 waybar; mode "default"
    # exit this mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

# sway
set $mode_sway  Sway: re[s]tart$menu_sepe[x]it$menu_sep[c]onfig reload$menu_sep[e]dit config$menu_sep[b]ar toggle$menu_sep[w]aybar
mode "$mode_sway" {
    # restart sway inplace (preserves your layout/session, can be used to upgrade sway)
    #bindsym s restart
    # reload the configuration file
    bindsym c reload
    bindsym x exec --no-startup-id swaymsg exit; mode "default"

    # edit config
    bindsym e exec --no-startup-id kitty --title=sway_config -- nvim ~/.config/sway/config; mode "default"
    # status bar toggle
    bindsym b bar mode toggle; mode "default"
    # waybar menu
    bindsym w mode "$mode_waybar"
    # exit mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
