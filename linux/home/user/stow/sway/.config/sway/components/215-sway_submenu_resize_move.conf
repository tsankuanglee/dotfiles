# resize window (you can also use the mouse for that)
set $mode_resize_move_window 󰆾 Resize/Move: [c]enter$menu_sep[1-5] presets$menu_sep[arrows/ijkl] resizing$menu_sep[+Alt] moving$menu_sep[+Shift] 10x$menu_sep[+Ctrl] 50x$menu_sep[+Shift+Ctrl] 100x
mode "$mode_resize_move_window" {

    # for floating
    bindsym c move position center
    bindsym 1 resize set 640 480
    bindsym 2 resize set 800 600
    bindsym 3 resize set 1024 768
    bindsym 4 resize set 1080 960
    bindsym 5 resize set 1280 800


    ## Resize: Down/Right grow, Up/Left shrink
    bindsym j resize shrink width 1 px
    bindsym k resize grow height 1 px
    bindsym i resize shrink height 1 px
    bindsym l resize grow width 1 px

    bindsym Left resize shrink width 1 px
    bindsym Down resize grow height 1 px
    bindsym Up resize shrink height 1 px
    bindsym Right resize grow width 1 px

    # shift for 10x
    bindsym Shift+j resize shrink width 10 px
    bindsym Shift+k resize grow height 10 px
    bindsym Shift+i resize shrink height 10 px
    bindsym Shift+l resize grow width 10 px

    bindsym Shift+Left resize shrink width 10 px
    bindsym Shift+Down resize grow height 10 px
    bindsym Shift+Up resize shrink height 10 px
    bindsym Shift+Right resize grow width 10 px

    # ctrl for 50x
    bindsym Control+j resize shrink width 50 px
    bindsym Control+k resize grow height 50 px
    bindsym Control+i resize shrink height 50 px
    bindsym Control+l resize grow width 50 px

    bindsym Control+Left resize shrink width 50 px
    bindsym Control+Down resize grow height 50 px
    bindsym Control+Up resize shrink height 50 px
    bindsym Control+Right resize grow width 50 px

    # shift+ctrl for 100x
    bindsym Control+Shift+j resize shrink width 100 px
    bindsym Control+Shift+k resize grow height 100 px
    bindsym Control+Shift+i resize shrink height 100 px
    bindsym Control+Shift+l resize grow width 100 px

    bindsym Control+Shift+Left resize shrink width 100 px
    bindsym Control+Shift+Down resize grow height 100 px
    bindsym Control+Shift+Up resize shrink height 100 px
    bindsym Control+Shift+Right resize grow width 100 px

    # move (Mod1 -- Alt)
    bindsym Mod1+j move left 1 px
    bindsym Mod1+k move down 1 px
    bindsym Mod1+i move up 1 px
    bindsym Mod1+l move right 1 px

    bindsym Mod1+Left move left 1 px
    bindsym Mod1+Down move down 1 px
    bindsym Mod1+Up move up 1 px
    bindsym Mod1+Right move right 1 px

    # shift 10x
    bindsym Mod1+Shift+j move left 10 px
    bindsym Mod1+Shift+k move down 10 px
    bindsym Mod1+Shift+i move up 10 px
    bindsym Mod1+Shift+l move right 10 px

    bindsym Mod1+Shift+Left move left 10 px
    bindsym Mod1+Shift+Down move down 10 px
    bindsym Mod1+Shift+Up move up 10 px
    bindsym Mod1+Shift+Right move right 10 px

    # control 50x
    bindsym Mod1+Control+j move left 50 px
    bindsym Mod1+Control+k move down 50 px
    bindsym Mod1+Control+i move up 50 px
    bindsym Mod1+Control+l move right 50 px

    bindsym Mod1+Control+Left move left 50 px
    bindsym Mod1+Control+Down move down 50 px
    bindsym Mod1+Control+Up move up 50 px
    bindsym Mod1+Control+Right move right 50 px

    # shift+control 100x
    bindsym Mod1+Shift+Control+j move left 100 px
    bindsym Mod1+Shift+Control+k move down 100 px
    bindsym Mod1+Shift+Control+i move up 100 px
    bindsym Mod1+Shift+Control+l move right 100 px

    bindsym Mod1+Shift+Control+Left move left 100 px
    bindsym Mod1+Shift+Control+Down move down 100 px
    bindsym Mod1+Shift+Control+Up move up 100 px
    bindsym Mod1+Shift+Control+Right move right 100 px

    # back to normal: Enter or Escape
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
