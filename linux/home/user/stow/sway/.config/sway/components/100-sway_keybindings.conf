# Sway keybindings
# see /usr/include/linux/input-event-codes.h for keycode

# {{{ MODIFIER KEYS
# Mod1=Alt; Mod4=Win
set $mod Mod4+Mod1
set $mod_win Mod4
# floating_modifier doesn't take combo mod keys https://github.com/swaywm/sway/issues/6867 so we have to set it to just one mod key
floating_modifier Mod4 normal
# }}} MODIFIER KEYS

# {{{ SWAY FUNCTIONS
# Lock the screen immediately
bindsym $mod_win+l exec bash -c "swaymsg 'output * dpms off';pkill -USR1 swayidle"

# Kill focused window
bindsym $mod+BackSpace kill

# Move focus
bindsym $mod+j focus left
bindsym $mod+k focus down
bindsym $mod+i focus up
bindsym $mod+l focus right

bindsym --whole-window $mod+button8 focus right
bindsym --whole-window $mod+button9 focus left

# Move the focused window
bindsym $mod+Shift+j move left
bindsym $mod+Shift+k move down
bindsym $mod+Shift+i move up
bindsym $mod+Shift+l move right

bindsym --whole-window $mod+Shift+button8 move right
bindsym --whole-window $mod+Shift+button9 move left

# default layout
workspace_layout tabbed
workspace_auto_back_and_forth yes

bindsym $mod+comma workspace prev
bindsym $mod+period workspace next

# Switch to workspace
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+q workspace number 4
bindsym $mod+w workspace number 5
bindsym $mod+e workspace number 6
bindsym $mod+a workspace number 7
bindsym $mod+s workspace number 8
bindsym $mod+d workspace number 9
bindsym $mod+z workspace number 10
bindsym $mod+x workspace number 11
bindsym $mod+c workspace number 12

# extended workspaces
bindsym $mod+4 workspace number 14
bindsym $mod+5 workspace number 15
bindsym $mod+6 workspace number 16
bindsym $mod+7 workspace number 17
bindsym $mod+8 workspace number 18
bindsym $mod+9 workspace number 19

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+q move container to workspace number 4
bindsym $mod+Shift+w move container to workspace number 5
bindsym $mod+Shift+e move container to workspace number 6
bindsym $mod+Shift+a move container to workspace number 7
bindsym $mod+Shift+s move container to workspace number 8
bindsym $mod+Shift+d move container to workspace number 9
bindsym $mod+Shift+z move container to workspace number 10
bindsym $mod+Shift+x move container to workspace number 11
bindsym $mod+Shift+c move container to workspace number 12

bindsym $mod+Shift+4 move container to workspace number 14
bindsym $mod+Shift+5 move container to workspace number 15
bindsym $mod+Shift+6 move container to workspace number 16
bindsym $mod+Shift+7 move container to workspace number 17
bindsym $mod+Shift+8 move container to workspace number 18
bindsym $mod+Shift+9 move container to workspace number 19

# Layout stuff:
bindsym $mod+Shift+v splith
bindsym $mod+v splitv

# Switch the current container between different layout styles
bindsym $mod+Tab layout tabbed
bindsym $mod+Shift+Tab layout stacking
bindsym $mod+t layout toggle split

# Make the current focus fullscreen
bindsym $mod+Return fullscreen

# Toggle the current focus between tiling and floating mode
bindsym $mod+f floating toggle
# also use mod+middle click
bindsym --whole-window $mod+button2 floating toggle

# Swap focus between the tiling area and the floating area
bindsym $mod+Shift+f focus mode_toggle

# Move focus to the parent container
bindsym $mod+p focus parent
bindsym $mod+Shift+p focus child

# Scratchpad:
# Move the currently focused window to the scratchpad
bindsym $mod+Shift+o move scratchpad

# Show the next scratchpad window or hide the focused scratchpad window.
bindsym $mod+o scratchpad show
# }}} SWAY FUNCTIONS

# {{{ Apps

# Launcher
#set $menu dmenu_path | dmenu | xargs swaymsg exec --
bindsym $mod_win+r exec rofi -show combi
#bindsym $mod_win+shift+s exec ~/.local/bin/restart_ulauncher.sh
#bindsym $mod_win+s exec ulauncher-toggle

# Terminal
bindsym $mod_win+n exec kitty

# }}} Apps
