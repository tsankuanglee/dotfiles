# {{{ SWAYIDLE
exec swayidle -w \
    idlehint 5 \
    timeout 293  'busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d .3'\
        resume   'busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 1' \
    timeout 300  'swaylock -f -c 000000' \
    timeout 330  'swaymsg "output * dpms off"' \
        resume   'sh -c "SWAYSOCK=$(ls /run/user/$(id -u)/sway-ipc.*.sock | head -1) sleep 0.5 && swaymsg \"output * dpms on\""' \
    before-sleep 'swaylock -f -c 000000'

# optional
# timeout 600  'systemctl suspend'
# timeout 660  'systemctl hybrid-sleep'

# }}} SWAYIDLE
