# mouse
set $mode_mouse 饇椉 Mouse: cursor [g]oto active window
mode "$mode_mouse" {
    bindsym g exec --no-startup-id ~/.local/bin/session_control/move_cursor_to_active_window.sh ; mode "default"

    # exit this mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
