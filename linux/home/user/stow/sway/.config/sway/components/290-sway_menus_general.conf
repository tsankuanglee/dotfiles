# This section MUST be at the end (after all modes are defined)
# MENU system - general

mode "$mode_general" {
    bindsym c mode "$mode_container"
    bindsym r mode "$mode_resize_move_window"
    bindsym w mode "$mode_workspace"
    bindsym g mode "$mode_gap"
    bindsym b mode "$mode_border"
    bindsym o mode "$mode_opacity"
    bindsym m mode "$mode_mouse"
    bindsym y mode "$mode_sway"
    bindsym s mode "$mode_system"
    bindsym h mode "$mode_hardware"
    bindsym t mode "$mode_tools"
    bindsym a mode "$mode_apps"

    # exit this mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

bindsym $mod+m mode "$mode_general"
