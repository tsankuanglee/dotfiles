# opacity
set $mode_opacity ¾░āĀ Opacity: [1-0] presets$menu_sep[-/+] adjust
mode "$mode_opacity" {
    bindsym grave opacity set 0.05
    bindsym 1 opacity set 0.1
    bindsym 2 opacity set 0.2
    bindsym 3 opacity set 0.3
    bindsym 4 opacity set 0.4
    bindsym 5 opacity set 0.5
    bindsym 6 opacity set 0.6
    bindsym 7 opacity set 0.7
    bindsym 8 opacity set 0.8
    bindsym 9 opacity set 0.9
    bindsym 0 opacity set 1.0
    bindsym minus opacity minus 0.05
    bindsym equal opacity plus 0.05

    # exit this mode: "Enter" or "Escape"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
